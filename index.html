  <title>月度打卡 · 2026.06.12-07.12</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card-hover: #1f1f35;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --green: #00b894;
      --orange: #fdcb6e;
      --red: #ff7675;
      --text: #e0e0e0;
      --text-dim: #888;
      --border: #2a2a40;
      --radius: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 16px);
    }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
    }
    body { padding: var(--safe-top) 16px calc(16px + var(--safe-bottom)); }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 16px 0 4px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .refresh-btn {
      position: fixed; top: calc(16px + var(--safe-top, 0px)); right: 16px;
      background: var(--card); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 14px;
      width: 34px; height: 34px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; z-index: 200;
    }
    .refresh-btn:active { background: var(--card-hover); color: var(--accent-light); }
    .header .date-range {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ── Progress Bar ── */
    .progress-wrap {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .progress-label { font-size: 13px; color: var(--text-dim); }
    .progress-pct { font-size: 22px; font-weight: 700; color: var(--accent-light); }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 4px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .streak-row {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .streak-num { color: var(--orange); font-weight: 700; font-size: 15px; }

    /* ── Module Card ── */
    .module { margin-bottom: 12px; }
    .module-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    .module-emoji { font-size: 18px; }
    .module-title { font-size: 16px; font-weight: 600; }
    .module-pct { font-size: 12px; color: var(--text-dim); margin-left: auto; }
    .module-arrow { font-size: 12px; color: var(--text-dim); transition: transform 0.3s; }
    .module.collapsed .module-arrow { transform: rotate(-90deg); }
    .module.collapsed .task-list { display: none; }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .task-item:active { background: var(--card-hover); }
    .task-item.done {
      border-color: rgba(0,184,148,0.3);
      background: rgba(0,184,148,0.06);
    }
    .checkbox {
      width: 24px; height: 24px;
      min-width: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      font-size: 13px;
      color: transparent;
    }
    .task-item.done .checkbox {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .task-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.4;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-dim);
    }
    .task-done-time {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 20px 0;
      font-size: 12px;
      color: var(--text-dim);
    }
    .footer .reset-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--green);
      color: #000;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ── Empty state ── */
    .day-reset-hint {
      text-align: center;
      padding: 12px;
      color: var(--orange);

  <script>
    // ============ 首页锁 ============
    var homeLocked = true;
    var homeLockSeconds = 5;
    var homeLockInterval = null;

    function clearLock() {
      if (homeLockInterval) { clearInterval(homeLockInterval); homeLockInterval = null; }
    }

    function initHomeLock() {
      // 先清理旧的 interval
      clearLock();

      var overlay = document.getElementById('homeLockOverlay');
      var timerEl = document.getElementById('homeLockTimer');
      var btns = document.querySelectorAll('.tab-btn');

      // 先清除所有锁定状态
      overlay.classList.remove('hidden');
      btns.forEach(function(b) { b.classList.remove('locked'); });

      // 标记时刻/每日目标为锁定
      btns.forEach(function(b) {
        var t = b.getAttribute('onclick');
        if (t.indexOf('hourly') !== -1 || t.indexOf('checkin') !== -1) {
          b.classList.add('locked');
        }
      });

      homeLocked = true;
      var left = homeLockSeconds;
      timerEl.textContent = left;

      homeLockInterval = setInterval(function() {
        left--;
        timerEl.textContent = left;
        if (left <= 0) {
          clearInterval(homeLockInterval);
          homeLockInterval = null;
          homeLocked = false;
          overlay.classList.add('hidden');
          btns.forEach(function(b) { b.classList.remove('locked'); });
        }
      }, 1000);
    }

    // 页面刷新时清理旧 interval
    window.addEventListener('beforeunload', clearLock);

    // ============ 原则数据 ============
    const PRINCIPLES = [
      '你再不努力老家房子就被别人扒了！',
      '好习惯大于一切',
      '每小时有具体产出',
      '进入心流，保持专注',
      '做复利的事，不重新开始',

      '先做一个垃圾出来',
      '不舒服就要找原因',
      '要有方法，而不是假努力'
    ];

    // ============ 任务数据定义 ============
    const TASKS = [
      // 一、习惯目标
      { id: 'h1', module: '习惯目标', emoji: '💤', title: '早睡目标', text: '10点躺床上，最晚10:30睡着，早6:30起床，确保8小时睡眠' },
      { id: 'h2', module: '习惯目标', emoji: '🥗', title: '防脱目标', text: '清淡饮食，不吃大油/奶油/奶茶，少喝茶，每周最多1次放纵大餐' },
      { id: 'h3', module: '习惯目标', emoji: '💪', title: '运动目标', text: '每周4次训练：2次胸肌训练 + 2次腹肌训练' },

      // 二、短视频目标
      { id: 'v1', module: '短视频目标', emoji: '🔍', title: '研究博主', text: '用AI研究两个博主的人设和选题思路' },
      { id: 'v2', module: '短视频目标', emoji: '🎬', title: '发布视频', text: '每两天发一个短视频，涨粉2000' },

      // 三、投资目标
      { id: 'i1', module: '投资目标', emoji: '🏗️', title: '黑客马拉松方案', text: '整理过往黑客松方案，策划完整黑客马拉松方案' },
      { id: 'i2', module: '投资目标', emoji: '📋', title: '新投资体系搭建', text: '完成一个流程的搭建，推进新投资体系' },
      { id: 'i3', module: '投资目标', emoji: '🤝', title: '发现项目', text: '想一个发现项目的方法，加一个创始人联系方式' },

      // 四、学习目标
      { id: 's1', module: '学习目标', emoji: '📖', title: '阅读书籍', text: '看挖掘用户需求的书籍30分钟' },
      { id: 's2', module: '学习目标', emoji: '🧠', title: '分析博主需求', text: '思考2个抖音博主人设对应的用户需求' },
      { id: 's3', module: '学习目标', emoji: '💡', title: '创业机会思考', text: '思考一个需求方向的创业项目机会' },
    ];

    const MODULES = ['习惯目标', '短视频目标', '投资目标', '学习目标'];
    const MODULE_EMOJIS = { '习惯目标': '🛌', '短视频目标': '📱', '投资目标': '💰', '学习目标': '📚' };

    // ============ 数据管理 ============
    const STORAGE_KEY = 'monthly_checkin_data';
    const DATE_KEY = 'monthly_checkin_date';

    function getToday() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch { return {}; }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getTodayChecked() {
      const data = loadData();
      const today = getToday();
      return data[today] || {};
    }

    function setTaskChecked(taskId, checked) {
      const data = loadData();
      const today = getToday();
      if (!data[today]) data[today] = {};
      if (checked) {
        data[today][taskId] = Date.now();
      } else {
        delete data[today][taskId];
      }
      // 清理30天前的旧数据
      const cutoff = new Date(Date.now() - 30 * 24 * 3600 * 1000);
      for (const k of Object.keys(data)) {
        if (new Date(k) < cutoff) delete data[k];
      }
      saveData(data);
    }

    function getStreak() {
      const data = loadData();
      let streak = 0;
      const d = new Date();
      while (true) {
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const dayData = data[dateStr] || {};
        const checked = Object.keys(dayData).length;
        if (checked === 0) break;
        streak++;
        d.setDate(d.getDate() - 1);
      }
      return streak;
    }

    function getTotalCheckins() {
      const data = loadData();
      let total = 0;
      for (const day of Object.values(data)) {
        total += Object.keys(day).length;
      }
      return total;
    }

    // ============ 渲染 ============
    function render() {
      const todayChecked = getTodayChecked();
      const modulesEl = document.getElementById('modules');
      modulesEl.innerHTML = '';

      let totalTasks = TASKS.length;
      let doneTasks = 0;

      MODULES.forEach(modName => {
        const modTasks = TASKS.filter(t => t.module === modName);
        let modDone = 0;

        const moduleDiv = document.createElement('div');
        moduleDiv.className = 'module';
        moduleDiv.innerHTML = `
          <div class="module-header" onclick="this.parentElement.classList.toggle('collapsed')">
            <span class="module-emoji">${MODULE_EMOJIS[modName]}</span>
            <span class="module-title">${modName}</span>
            <span class="module-pct" id="modPct_${modName}">0/${modTasks.length}</span>
            <span class="module-arrow">▼</span>
          </div>
          <div class="task-list" id="taskList_${modName}"></div>
        `;

        const taskList = moduleDiv.querySelector('.task-list');

        modTasks.forEach(task => {
          const isDone = !!todayChecked[task.id];
          if (isDone) modDone++;
          const doneTime = todayChecked[task.id] ? formatTime(todayChecked[task.id]) : '';

          const item = document.createElement('div');
          item.className = 'task-item' + (isDone ? ' done' : '');
          item.onclick = () => toggleTask(task.id, task.title);
          item.innerHTML = `
            <div class="checkbox">✓</div>
            <div class="task-text">${task.emoji} <b>${task.title}</b><br><span style="font-size:12px;color:#888;">${task.text}</span></div>
            ${doneTime ? `<div class="task-done-time">${doneTime}</div>` : ''}
          `;
          taskList.appendChild(item);
        });

        doneTasks += modDone;
        moduleDiv.querySelector('.module-pct').textContent = `${modDone}/${modTasks.length}`;
        if (modDone === modTasks.length) {
          moduleDiv.querySelector('.module-pct').style.color = 'var(--green)';
        }

        modulesEl.appendChild(moduleDiv);
      });

      // 更新进度条
      const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
      document.getElementById('todayPct').textContent = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('streakDays').textContent = getStreak();
      document.getElementById('totalCheckins').textContent = getTotalCheckins();

      // 完成庆祝
      if (pct === 100 && doneTasks > 0) {
        document.getElementById('todayPct').style.color = 'var(--green)';
        showToast('🎉 今日全部完成！太棒了！');
      } else {
        document.getElementById('todayPct').style.color = 'var(--accent-light)';
      }

      // 每日重置提示
      updateResetHint();
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function updateResetHint() {
      const hint = document.getElementById('resetHint');
      const today = getToday();
      const savedDate = localStorage.getItem(DATE_KEY);
      if (savedDate && savedDate !== today) {
        hint.textContent = '🆕 新的一天！昨天已完成的任务已重置，继续加油！';
      } else {
        hint.textContent = '';
      }
      localStorage.setItem(DATE_KEY, today);
    }

    // ============ 交互 ============
    function toggleTask(taskId, taskTitle) {
      const todayChecked = getTodayChecked();
      const isDone = !!todayChecked[taskId];
      setTaskChecked(taskId, !isDone);

      if (!isDone) {
        showToast('✅ ' + taskTitle + ' — 完成！');
        // 触觉反馈（如果支持）
        if (navigator.vibrate) navigator.vibrate(10);
      }

      render();
    }

    function resetToday() {
      if (confirm('确定要重置今天所有打卡记录吗？')) {
        const data = loadData();
        const today = getToday();
        delete data[today];
        saveData(data);
        render();
        showToast('🔄 已重置');
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    // ============ 日历渲染 ============
    let calYear, calMonth;
    function renderCalendar() {
      const now = new Date();
      calYear = now.getFullYear();
      calMonth = now.getMonth();
      renderCalGrid();
    }

    function renderCalGrid() {
      const grid = document.getElementById('calGrid');
      document.getElementById('calMonthLabel').textContent = `${calYear}年${calMonth + 1}月`;
      grid.innerHTML = '';

      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const today = getToday();
      const data = loadData();

      // 填充空白
      for (let i = 0; i < firstDay; i++) {
        grid.innerHTML += '<div class="cal-day empty"></div>';
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayData = data[dateStr] || {};
        const checked = Object.keys(dayData).length;
        let cls = 'cal-day';
        if (checked > 0) {
          cls += ' has-data';
          if (checked === TASKS.length) cls += ' done-all';
          else cls += ' done-part';
        }
        if (dateStr === today) cls += ' today';
        grid.innerHTML += `<div class="${cls}">${d}</div>`;
      }
    }

    function changeMonth(delta) {
      calMonth += delta;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalGrid();
    }

    // ============ 原则渲染 ============
    function renderPrinciples() {
      const el = document.getElementById('principlesList');
      el.innerHTML = PRINCIPLES.map((p, i) =>
        `<div class="principle-item${i===0?' first-principle':''}"><span class="principle-num">${i+1}.</span><span>${p}</span></div>`
      ).join('');
    }

    // ============ Tab 切换 ============
    function switchTab(tab) {
      // 首页锁：未解锁时只能看首页
      if (homeLocked && tab !== 'home') return;

      document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + tab).classList.add('active');
      document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
      updateHeader(tab);
      if (tab === 'home') renderCalendar();
      if (tab === 'hourly') renderHourly();

    // 日历翻月
    document.getElementById('calMonthLabel').addEventListener('click', function(e) {
      e.stopPropagation();
      changeMonth(1);
    });
    // 双击回当月
    document.getElementById('calMonthLabel').addEventListener('dblclick', function() {
      const now = new Date();
      calYear = now.getFullYear();
      calMonth = now.getMonth();
      renderCalGrid();

    // ============ 每小时打卡 ============
    const HOURLY_KEY = 'monthly_hourly_data';

    const WORK_SLOTS = [
      { id:'s1',  time:'06:30', end:'07:30', label:'06:30-07:30' },
      { id:'s2',  time:'07:30', end:'08:30', label:'07:30-08:30' },
      { id:'s3',  time:'08:30', end:'09:30', label:'08:30-09:30' },
      { id:'s4',  time:'09:30', end:'10:30', label:'09:30-10:30' },
      { id:'s5',  time:'10:30', end:'11:30', label:'10:30-11:30' },
      { id:'s6',  time:'11:30', end:'12:30', label:'11:30-12:30' },
      { id:'s7',  time:'12:30', end:'13:30', label:'12:30-13:30' },
      { id:'s8',  time:'13:30', end:'14:30', label:'13:30-14:30' },
      { id:'s9',  time:'14:30', end:'15:30', label:'14:30-15:30' },

    function loadHourly() {
      try { var r = localStorage.getItem(HOURLY_KEY); return r ? JSON.parse(r) : {}; }
      catch { return {}; }
    }
    function saveHourly(data) { localStorage.setItem(HOURLY_KEY, JSON.stringify(data)); }
    function getTodayHourly() {
      var d = loadHourly();
      var t = getToday();
      if (!d[t]) d[t] = { goals: {}, done: {} };
      return d[t];
    }

    function setHourlyGoal(slotId, type, goal) {
      var d = loadHourly();
      var t = getToday();
      if (!d[t]) d[t] = { goals: {}, done: {} };
      if (!d[t].goals[slotId]) d[t].goals[slotId] = {};
      d[t].goals[slotId][type] = goal;
      saveHourly(d);
    }

    function getHourlyGoal(today, slotId, type) {
      var g = today.goals[slotId];
      if (typeof g === 'string') return ''; // 兼容旧数据
      return (g && g[type]) || '';
    }

    function toggleHourlyDone(slotId, type) {
      var d = loadHourly();
      var t = getToday();
      if (!d[t]) d[t] = { goals: {}, done: {} };
      if (!d[t].done[slotId] || typeof d[t].done[slotId] === 'boolean') {
        d[t].done[slotId] = {};
      }
      d[t].done[slotId][type] = !(d[t].done[slotId][type] === true);
      saveHourly(d);
      renderHourly();
    }

    function isHourlyDone(today, slotId, type) {
      var d = today.done[slotId];
      if (typeof d === 'boolean') return d; // 兼容旧数据
      return !!(d && d[type]);
    }

    function clearAllHourly() {
      if (!confirm('确定清空今日所有时刻目标和完成状态？')) return;
      var d = loadHourly();
      d[getToday()] = { goals: {}, done: {} };
      saveHourly(d);
      renderHourly();
    }

    function copyYesterdayHourly() {
      var d = loadHourly();
      var yesterday = new Date(Date.now() - 86400000);
      var yk = yesterday.getFullYear()+'-'+String(yesterday.getMonth()+1).padStart(2,'0')+'-'+String(yesterday.getDate()).padStart(2,'0');
      if (!d[yk] || Object.keys(d[yk].goals||{}).length === 0) {
        alert('昨日无数据可复制');
        return;
      }
      d[getToday()] = { goals: Object.assign({}, d[yk].goals), done: {} };
      saveHourly(d);
      renderHourly();
    }

    var hourlyEditingSlot = null;
    var hourlyEditingType = null;  // 'habit' or 'focus'

    function startEditHourly(slotId, type, currentGoal) {
      hourlyEditingSlot = slotId;
      hourlyEditingType = type;
      renderHourly();
      var inp = document.getElementById('hourlyEditInput');
      if (inp) { inp.value = currentGoal || ''; setTimeout(function(){ inp.focus(); }, 100); }
    }

    function saveEditHourly(slotId) {
      var inp = document.getElementById('hourlyEditInput');
      var goal = inp ? inp.value.trim() : '';
      setHourlyGoal(slotId, hourlyEditingType, goal);
      hourlyEditingSlot = null;
      hourlyEditingType = null;
      renderHourly();
    }

    function cancelEditHourly() {
      hourlyEditingSlot = null;
      hourlyEditingType = null;
      renderHourly();
    }

    function renderHourly() {
      var today = getTodayHourly();
      var dateEl = document.getElementById('headerDate');
      var now = new Date();
      var weekDays = ['日','一','二','三','四','五','六'];
      dateEl.textContent = '📅 ' + now.getFullYear()+'.'+(now.getMonth()+1)+'.'+now.getDate()+' 周'+weekDays[now.getDay()];

      // ---- 计算当前轮次 ----
      var currentRound = 0; // 0 = 还没开始
      var total = WORK_SLOTS.length + NIGHT_SLOTS.length;
      var h = now.getHours(), m = now.getMinutes();
      var nowMin = h * 60 + m;

      for (var i = 0; i < WORK_SLOTS.length; i++) {
        var t = WORK_SLOTS[i].time.split(':');
        var slotMin = parseInt(t[0]) * 60 + parseInt(t[1]);
        if (nowMin >= slotMin) currentRound = i + 1;
      }
      // 晚间轮次
      if (nowMin >= 21*60+30) currentRound = 16; // 自由活动
      if (nowMin >= 22*60) currentRound = 17;    // 上床
      if (nowMin >= 22*60+30) currentRound = 18; // 入睡
      if (nowMin >= 6*60+30 && nowMin < 22*60+30 && currentRound === 0) currentRound = 1;

      // 检查凌晨（0-6:30），入睡和起床是跨天的
      if (h < 6 || (h === 6 && m < 30)) {
        currentRound = 18; // 还在入睡时间段
      }

      // ---- 统计 ----
      var habitDoneCnt = 0, habitMissCnt = 0;
      var focusDoneCnt = 0, focusMissCnt = 0;
      var habitDots = '', focusDots = '';

      for (var i = 0; i < WORK_SLOTS.length; i++) {
        var s = WORK_SLOTS[i];
        var habitDone = isHourlyDone(today, s.id, 'habit');
        var focusDone = isHourlyDone(today, s.id, 'focus');
        var roundNum = i + 1;

        // habit dot
        if (roundNum < currentRound) {
          if (habitDone) { habitDots += '<span class="dot done"></span>'; habitDoneCnt++; }
          else { habitDots += '<span class="dot miss"></span>'; habitMissCnt++; }
        } else if (roundNum === currentRound) {
          if (habitDone) { habitDots += '<span class="dot done"></span>'; habitDoneCnt++; }
          else { habitDots += '<span class="dot current"></span>'; }
        } else {
          habitDots += '<span class="dot"></span>';
        }

        // focus dot
        if (roundNum < currentRound) {
          if (focusDone) { focusDots += '<span class="dot done"></span>'; focusDoneCnt++; }
          else { focusDots += '<span class="dot miss"></span>'; focusMissCnt++; }
        } else if (roundNum === currentRound) {
          if (focusDone) { focusDots += '<span class="dot done"></span>'; focusDoneCnt++; }
          else { focusDots += '<span class="dot current"></span>'; }
        } else {
          focusDots += '<span class="dot"></span>';
        }
      }

      // 晚间4轮
      for (var j = 0; j < NIGHT_SLOTS.length; j++) {
        var ns = NIGHT_SLOTS[j];
        var nightDone = typeof today.done[ns.id] === 'boolean' ? today.done[ns.id] : isHourlyDone(today, ns.id, 'habit');
        var rn = WORK_SLOTS.length + j + 1;

        if (rn < currentRound) {
          if (nightDone) { habitDots += '<span class="dot done"></span>'; habitDoneCnt++; }
          else { habitDots += '<span class="dot miss"></span>'; habitMissCnt++; }
        } else if (rn === currentRound) {
          if (nightDone) { habitDots += '<span class="dot done"></span>'; habitDoneCnt++; }
          else { habitDots += '<span class="dot current"></span>'; }
        } else {
          habitDots += '<span class="dot"></span>';
        }
        // 晚间只有一行，focus行也用相同dot
        if (rn < currentRound) {
          if (nightDone) { focusDots += '<span class="dot done"></span>'; focusDoneCnt++; }
          else { focusDots += '<span class="dot miss"></span>'; focusMissCnt++; }
        } else if (rn === currentRound) {
          if (nightDone) { focusDots += '<span class="dot done"></span>'; focusDoneCnt++; }
          else { focusDots += '<span class="dot current"></span>'; }
        } else {
          focusDots += '<span class="dot"></span>';
        }
      }

      // ---- 渲染顶部信息 ----
      var infoEl = document.getElementById('hourlyRoundInfo');
      if (currentRound === 0 || currentRound > total) {
        infoEl.innerHTML = '<span class="round-num">' + total + '</span> 轮 · 全天结束';
      } else {
        infoEl.innerHTML = '第 <span class="round-num">' + currentRound + '</span> / ' + total + ' 轮';
      }

      var statsEl = document.getElementById('hourlyRoundStats');
      statsEl.innerHTML =
        '<span>习惯 <span class="done-cnt">✓' + habitDoneCnt + '</span> <span class="miss-cnt">✗' + habitMissCnt + '</span></span>' +
        '<span>45min <span class="done-cnt">✓' + focusDoneCnt + '</span> <span class="miss-cnt">✗' + focusMissCnt + '</span></span>';

      document.getElementById('hourlyDotsHabit').innerHTML =
        '<span class="dots-label">习惯</span><div class="dots">' + habitDots + '</div>';
      document.getElementById('hourlyDotsFocus').innerHTML =
        '<span class="dots-label">45min</span><div class="dots">' + focusDots + '</div>';

      // ---- 时段卡片 ----
      var html = '';
      var currentSlotId = currentRound > 0 && currentRound <= WORK_SLOTS.length ? WORK_SLOTS[currentRound - 1].id : null;

      // 先渲染当前时段（高亮置顶）
      var currentSlotHtml = '';
      WORK_SLOTS.forEach(function(s) {
        var habitGoal = getHourlyGoal(today, s.id, 'habit');
        var focusGoal = getHourlyGoal(today, s.id, 'focus');
        var habitDone = isHourlyDone(today, s.id, 'habit');
        var focusDone = isHourlyDone(today, s.id, 'focus');
        var isCurrent = s.id === currentSlotId;

        var card = '<div class="hourly-slot' + (isCurrent ? ' current-slot' : '') + '">';
        card += '<div class="hourly-time"><div>' + s.time + '</div><div class="time-dash">│</div><div>' + s.end + '</div><div class="sub">45+15</div></div>';
        card += '<div class="hourly-goals-wrap">';

        var isEditingHabit = hourlyEditingSlot === s.id && hourlyEditingType === 'habit';
        if (isEditingHabit) {
          card += '<div class="hourly-goal-row habit"><span class="goal-tag habit-tag">习惯</span><div class="hourly-goal-edit"><input id="hourlyEditInput" placeholder="习惯目标..." onkeydown="if(event.key===\'Enter\')saveEditHourly(\''+s.id+'\');if(event.key===\'Escape\')cancelEditHourly();" onblur="saveEditHourly(\''+s.id+'\')"></div></div>';
        } else {
          card += '<div class="hourly-goal-row habit' + (habitDone ? ' done-row' : '') + '" onclick="startEditHourly(\''+s.id+'\',\'habit\',\'' + (habitGoal||'').replace(/'/g,"\\'") + '\')"><span class="goal-tag habit-tag">习惯</span><span class="goal-text">' + (habitGoal || '点击设置...') + '</span><span class="check-mini' + (habitDone ? ' done' : '') + '" onclick="event.stopPropagation();toggleHourlyDone(\''+s.id+'\',\'habit\')">' + (habitDone ? '✓' : '✗') + '</span></div>';
        }

        var isEditingFocus = hourlyEditingSlot === s.id && hourlyEditingType === 'focus';
        if (isEditingFocus) {
          card += '<div class="hourly-goal-row focus"><span class="goal-tag focus-tag">45min</span><div class="hourly-goal-edit"><input id="hourlyEditInput" placeholder="45min目标..." onkeydown="if(event.key===\'Enter\')saveEditHourly(\''+s.id+'\');if(event.key===\'Escape\')cancelEditHourly();" onblur="saveEditHourly(\''+s.id+'\')"></div></div>';
        } else {
          card += '<div class="hourly-goal-row focus' + (focusDone ? ' done-row' : '') + '" onclick="startEditHourly(\''+s.id+'\',\'focus\',\'' + (focusGoal||'').replace(/'/g,"\\'") + '\')"><span class="goal-tag focus-tag">45min</span><span class="goal-text">' + (focusGoal || '点击设置...') + '</span><span class="check-mini' + (focusDone ? ' done' : '') + '" onclick="event.stopPropagation();toggleHourlyDone(\''+s.id+'\',\'focus\')">' + (focusDone ? '✓' : '✗') + '</span></div>';
        }

        card += '</div>';
        card += '</div>';

        if (isCurrent) {
          currentSlotHtml = card;
        } else {
          html += card;
        }
      });

      // 当前时段放在最上面
      if (currentSlotHtml) {
        html = currentSlotHtml + html;
      }

      html += '<div class="hourly-divider">🌙 晚间</div>';

      NIGHT_SLOTS.forEach(function(s) {
        var goal = typeof today.goals[s.id] === 'string' ? today.goals[s.id] : (getHourlyGoal(today, s.id, 'habit') || s.goal);
        var isDone = typeof today.done[s.id] === 'boolean' ? today.done[s.id] : isHourlyDone(today, s.id, 'habit');

        html += '<div class="hourly-slot night' + (isDone ? ' done' : '') + '">';
        html += '<div class="hourly-time">' + s.time + '</div>';
        html += '<div class="hourly-goal' + (goal ? '' : ' empty') + '">' + (goal || '点击设置目标...') + '</div>';
        html += '<div class="hourly-check" onclick="toggleHourlyDone(\''+s.id+'\',\'habit\')">✓</div>';
        html += '</div>';
      });

      document.getElementById('hourlySlots').innerHTML = html;
    }
    const CYCLE_END = new Date(2026, 6, 12);

    function updateHeader(tab) {
      const title = document.getElementById('headerTitle');
      const date = document.getElementById('headerDate');
      if (tab === 'checkin') {
        var now = new Date();
        var eod = new Date(now); eod.setHours(23,59,59,999);

        date.textContent = '本月目标倒计时';
      } else if (tab === 'hourly') {
        title.innerHTML = '⏰ 时刻打卡';
        title.style.cssText = '';
        var d = new Date();
        date.textContent = d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate() + ' ' + ['日','一','二','三','四','五','六'][d.getDay()];
      } else {
        title.innerHTML = '🎯 月度打卡';
        title.style.cssText = '';
        date.textContent = '2026.06.12 — 2026.07.12';
      }
    }

    // ============ 初始化 ============
    render();
    renderPrinciples();
    renderCalendar();
    switchTab('home');
    initHomeLock();

    // 午夜自动刷新（检测日期变化）
    function scheduleMidnightRefresh() {
      const now = new Date();
      const midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      const ms = midnight - now;
      setTimeout(() => {
        render();
        scheduleMidnightRefresh();
      }, ms + 1000);
    }
    scheduleMidnightRefresh();

    // ============ Service Worker (自动更新) ============
    if ('serviceWorker' in navigator) {
      // 先强制清除所有 SW 缓存
      caches.keys().then(function(keys) {
        keys.forEach(function(k) { caches.delete(k); });
      });
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      }).then(function() {
        // 延迟重新注册
        setTimeout(function() {
          navigator.serviceWorker.register('sw.js').then(function(reg) {
            reg.addEventListener('updatefound', function() {
              var newSW = reg.installing;
              newSW.addEventListener('statechange', function() {
                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                  window.location.reload();
                }
              });
            });
          }).catch(function() {});
        }, 500);
      });
    }
  </script>
</body>
</html>
