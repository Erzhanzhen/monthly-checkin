<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f1a">
  <title>月度打卡 · 桌面版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card-hover: #1f1f35;
      --accent: #6c5ce7;
      --accent-light: #a29bfe;
      --green: #00b894;
      --orange: #fdcb6e;
      --red: #ff7675;
      --text: #e0e0e0;
      --text-dim: #888;
      --border: #2a2a40;
      --radius: 14px;
    }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ── */
    .desktop-header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 56px; background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 20px;
      z-index: 200;
    }
    .desktop-header .logo {
      font-size: 18px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .desktop-header .header-center {
      flex: 1; text-align: center;
      font-size: 12px; color: var(--text-dim);
    }
    .desktop-header .header-right {
      display: flex; align-items: center; gap: 10px;
    }
    .sync-pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 12px;
      font-size: 11px; color: var(--text-dim);
      background: var(--bg); border: 1px solid var(--border);
    }
    .sync-pill.synced { color: var(--green); border-color: rgba(0,184,148,0.4); }
    .sync-pill.error { color: var(--red); border-color: rgba(255,118,117,0.4); }
    .sync-pill.syncing { color: var(--orange); }
    .header-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .header-btn:hover { color: var(--accent-light); border-color: var(--accent-light); }

    /* ── Sidebar ── */
    .desktop-sidebar {
      position: fixed; top: 56px; left: 0;
      width: 220px; height: calc(100vh - 56px);
      background: var(--card); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto; z-index: 100;
    }
    .sidebar-nav { padding: 12px 0; }
    .sidebar-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; font-size: 14px; color: var(--text-dim);
      cursor: pointer; transition: all 0.2s;
      border-left: 3px solid transparent;
      user-select: none;
    }
    .sidebar-nav-item:hover { background: rgba(108,92,231,0.05); color: var(--text); }
    .sidebar-nav-item.active {
      background: rgba(108,92,231,0.08); color: var(--accent-light);
      border-left-color: var(--accent); font-weight: 600;
    }
    .sidebar-nav-item.locked { opacity: 0.4; cursor: not-allowed; }
    .sidebar-nav-item.locked:hover { background: transparent; color: var(--text-dim); }
    .sidebar-nav-icon { font-size: 18px; }
    .sidebar-bottom {
      margin-top: auto; padding: 16px 16px;
      border-top: 1px solid var(--border);
    }
    .sidebar-stat-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: var(--text-dim); margin-bottom: 6px;
    }
    .sidebar-stat-row .stat-val { font-weight: 700; color: var(--orange); }
    .sidebar-mini-progress {
      margin: 10px 0 8px;
    }
    .sidebar-mini-progress .mini-label {
      font-size: 11px; color: var(--text-dim); margin-bottom: 4px;
    }
    .mini-bar {
      height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .mini-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 2px; transition: width 0.4s; width: 0%;
    }
    .sidebar-sync-status {
      font-size: 10px; color: var(--text-dim); margin-top: 8px;
      display: flex; align-items: center; gap: 4px;
    }
    .sidebar-sync-status .dot-indicator {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim);
    }
    .sidebar-sync-status .dot-indicator.synced { background: var(--green); }
    .sidebar-sync-status .dot-indicator.error { background: var(--red); }
    .sidebar-settings-btn {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 16px; padding: 4px;
      float: right; transition: color 0.2s;
    }
    .sidebar-settings-btn:hover { color: var(--accent-light); }

    /* ── Main Content ── */
    .desktop-main {
      margin-left: 220px; margin-top: 56px;
      padding: 24px; min-height: calc(100vh - 56px);
    }
    .desktop-page { display: none; }
    .desktop-page.active { display: block; }

    /* ── Cards ── */
    .desktop-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .card-title {
      font-size: 15px; font-weight: 600; margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── Home Lock Overlay ── */
    .home-lock-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 300;
      background: rgba(15,15,26,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: all;
      transition: opacity 0.4s;
    }
    .home-lock-overlay.hidden { opacity: 0; pointer-events: none; }
    .home-lock-icon { font-size: 40px; margin-bottom: 12px; }
    .home-lock-timer {
      font-size: 48px; font-weight: 900; color: var(--accent-light);
      margin-bottom: 8px;
    }
    .home-lock-hint { font-size: 14px; color: var(--text-dim); }

    /* ── Page 1: Principles + Calendar Side by Side ── */
    .principles-cal-row {
      display: flex; gap: 20px;
    }
    .principles-cal-row > div { flex: 1; min-width: 0; }

    .principle-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 6px 0; font-size: 13px; line-height: 1.5;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .principle-item:last-child { border-bottom: none; }
    .principle-item.first-principle {
      font-size: 14px; font-weight: 700;
      color: #ff7675; background: rgba(255,118,117,0.08);
      border-radius: 8px; padding: 8px 10px; margin-bottom: 4px;
      border-bottom: none;
    }
    .principle-num {
      color: var(--accent-light); font-weight: 700; font-size: 12px;
      min-width: 18px;
    }

    /* ── Calendar ── */
    .cal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .cal-nav-arrows {
      display: flex; gap: 4px;
    }
    .cal-nav-btn {
      background: var(--card-hover); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 14px; width: 28px; height: 28px;
      border-radius: 6px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .cal-nav-btn:hover { color: var(--accent-light); border-color: var(--accent-light); }
    .cal-month-title { font-size: 14px; font-weight: 600; cursor: pointer; }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      text-align: center; font-size: 11px; color: var(--text-dim);
      margin-bottom: 6px;
    }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 4px; text-align: center;
    }
    .cal-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 12px; border-radius: 8px; color: var(--text-dim);
    }
    .cal-day.has-data { color: var(--text); }
    .cal-day.done-all { background: var(--green); color: #000; font-weight: 700; }
    .cal-day.done-part { background: rgba(108,92,231,0.3); color: var(--accent-light); }
    .cal-day.today { border: 2px solid var(--accent-light); }
    .cal-day.empty { visibility: hidden; }
    .cal-legend {
      display: flex; gap: 12px; margin-top: 10px; font-size: 10px; color: var(--text-dim);
    }
    .cal-legend span { display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
    .legend-dot.full { background: var(--green); }
    .legend-dot.part { background: rgba(108,92,231,0.5); }

    /* ── Monthly Stats ── */
    .monthly-stats {
      display: flex; gap: 12px; margin-top: 16px;
    }
    .monthly-stat {
      flex: 1; text-align: center; padding: 10px;
      background: rgba(108,92,231,0.05); border-radius: 10px;
      border: 1px solid var(--border);
    }
    .monthly-stat .stat-value { font-size: 20px; font-weight: 700; color: var(--accent-light); }
    .monthly-stat .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ── Page 2: Hourly Timeline ── */
    .hourly-round-info {
      text-align: center; padding: 8px 0 4px;
      font-size: 15px; font-weight: 700; color: var(--text);
    }
    .hourly-round-info .round-num {
      font-size: 28px; font-weight: 900; color: var(--accent-light);
    }
    .hourly-round-stats {
      display: flex; justify-content: center; gap: 20px;
      font-size: 12px; color: var(--text-dim); margin-bottom: 10px;
    }
    .hourly-round-stats span { display: flex; align-items: center; gap: 4px; }
    .done-cnt { color: var(--green); font-weight: 700; }
    .miss-cnt { color: var(--red); font-weight: 700; }

    .hourly-dots-row {
      display: flex; align-items: center; gap: 4px;
      margin-bottom: 6px; padding: 0 4px;
      font-size: 10px; color: var(--text-dim);
    }
    .hourly-dots-row .dots-label {
      width: 36px; font-size: 10px; font-weight: 600; flex-shrink: 0; text-align: right; padding-right: 4px;
    }
    .hourly-dots-row .dots {
      display: flex; gap: 1px; flex-wrap: nowrap; flex: 1;
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--border); flex-shrink: 0;
      transition: background 0.2s;
    }
    .dot.done { background: var(--green); }
    .dot.miss { background: var(--red); }
    .dot.current {
      background: var(--accent-light);
      box-shadow: 0 0 6px var(--accent-light);
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 4px var(--accent-light); }
      50% { box-shadow: 0 0 10px var(--accent-light), 0 0 16px var(--accent); }
    }

    .hourly-actions {
      display: flex; justify-content: flex-end; gap: 8px;
      margin-bottom: 14px;
    }
    .hourly-actions button {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text-dim); font-size: 12px; padding: 5px 12px;
      border-radius: 6px; cursor: pointer; transition: all 0.15s;
    }
    .hourly-actions button:hover {
      background: var(--card-hover); color: var(--accent-light);
    }

    .hourly-slot {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .hourly-slot:hover { border-color: rgba(108,92,231,0.3); }
    .hourly-slot.current-slot {
      border-color: var(--accent-light);
      background: linear-gradient(135deg, rgba(108,92,231,0.18), rgba(162,155,254,0.08));
      box-shadow: 0 0 20px rgba(162,155,254,0.15);
      position: relative; overflow: hidden;
    }
    .hourly-slot.current-slot::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--accent-light), #d0c8ff);
      border-radius: 2px 0 0 2px;
    }
    .hourly-slot.past-slot {
      opacity: 0.5;
    }
    .hourly-slot.past-slot .goal-text {
      text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.15);
    }
    .hourly-time {
      font-size: 11px; font-weight: 700; color: var(--accent-light);
      min-width: 52px; text-align: center; line-height: 1.3;
      display: flex; flex-direction: column; align-items: center;
    }
    .hourly-time .sub {
      font-size: 9px; font-weight: 400; color: var(--text-dim);
    }
    .hourly-time .time-dash {
      font-size: 9px; color: var(--text-dim); line-height: 1;
    }
    .hourly-goals-wrap {
      flex: 1; display: flex; flex-direction: column; gap: 4px;
      min-width: 0;
    }
    .hourly-goal-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; line-height: 1.4;
      cursor: pointer; padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: border-color 0.15s, background 0.15s;
      min-height: 30px;
    }
    .hourly-goal-row.habit { background: rgba(108,92,231,0.06); }
    .hourly-goal-row.focus { background: rgba(0,184,148,0.05); }
    .hourly-goal-row:hover { border-color: var(--border); }
    .goal-tag {
      font-size: 10px; font-weight: 700; padding: 1px 6px;
      border-radius: 4px; min-width: 40px; text-align: center;
      flex-shrink: 0;
    }
    .habit-tag { background: rgba(108,92,231,0.2); color: var(--accent-light); }
    .focus-tag { background: rgba(0,184,148,0.2); color: var(--green); }
    .goal-text { flex: 1; word-break: break-all; line-height: 1.5; }
    .hourly-goal-row.done-row { opacity: 0.5; }
    .hourly-goal-row.done-row .goal-text { text-decoration: line-through; color: var(--text-dim); }
    .check-mini {
      width: 24px; height: 24px; min-width: 24px;
      border-radius: 50%; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
      background: rgba(255,118,117,0.15); color: var(--red);
    }
    .check-mini.done { background: var(--green); color: #000; }
    .hourly-goal-edit { flex: 1; }
    .hourly-goal-edit input {
      width: 100%; background: var(--bg); border: 1px solid var(--accent-light);
      border-radius: 8px; padding: 5px 10px; font-size: 12px;
      color: var(--text); outline: none; font-family: inherit;
    }

    /* Future slots: 2-column grid */
    .future-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .future-grid .hourly-slot { margin-bottom: 0; }

    /* Night slots: 2-column grid */
    .night-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .night-grid .hourly-slot.night {
      margin-bottom: 0;
      border-color: rgba(253,203,110,0.25);
      background: rgba(253,203,110,0.04);
    }
    .night-grid .hourly-slot.night.done {
      border-color: rgba(0,184,148,0.3);
      background: rgba(0,184,148,0.05);
    }
    .night-check {
      width: 28px; height: 28px; min-width: 28px;
      border-radius: 50%; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 14px; transition: all 0.2s;
      background: transparent; color: transparent;
    }
    .night-grid .hourly-slot.night.done .night-check {
      background: var(--green); border-color: var(--green); color: #000;
    }
    .hourly-divider {
      text-align: center; padding: 14px 0 10px;
      font-size: 12px; color: var(--text-dim);
      letter-spacing: 1px;
    }
    .hourly-divider::before, .hourly-divider::after {
      content: ' ── '; color: var(--border);
    }

    /* Past slots: accordion */
    .past-accordion-header {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 0; cursor: pointer; font-size: 12px;
      color: var(--text-dim); transition: color 0.15s;
      margin-top: 8px;
    }
    .past-accordion-header:hover { color: var(--text); }
    .past-accordion-header .accordion-arrow {
      font-size: 10px; transition: transform 0.2s;
    }
    .past-accordion-header.open .accordion-arrow { transform: rotate(90deg); }
    .past-accordion-body { display: none; }
    .past-accordion-body.open { display: block; }

    /* ── Page 3: Daily Goals ── */
    .desktop-module {
      margin-bottom: 16px;
    }
    .desktop-module-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 600; margin-bottom: 8px;
      color: var(--text);
    }
    .desktop-module-header .module-emoji { font-size: 18px; }
    .desktop-module-header .module-pct {
      font-size: 12px; color: var(--text-dim); margin-left: auto;
    }
    .desktop-task-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 6px;
      cursor: pointer; transition: all 0.15s;
    }
    .desktop-task-item:hover { background: var(--card-hover); }
    .desktop-task-item.done {
      border-color: rgba(0,184,148,0.3);
      background: rgba(0,184,148,0.05);
    }
    .checkbox-desk {
      width: 24px; height: 24px; min-width: 24px;
      border-radius: 50%; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: transparent; transition: all 0.2s;
    }
    .desktop-task-item.done .checkbox-desk {
      background: var(--green); border-color: var(--green); color: #fff;
    }
    .desktop-task-item .task-text {
      flex: 1; font-size: 13px; line-height: 1.4;
    }
    .desktop-task-item.done .task-text {
      text-decoration: line-through; color: var(--text-dim);
    }
    .desktop-task-item .task-done-time {
      font-size: 11px; color: var(--text-dim); white-space: nowrap;
    }

    /* Progress bar for page 3 */
    .desktop-progress-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px; margin-bottom: 18px;
    }
    .progress-top {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .progress-label { font-size: 13px; color: var(--text-dim); }
    .progress-pct { font-size: 24px; font-weight: 700; color: var(--accent-light); }
    .progress-bar {
      height: 8px; background: var(--border);
      border-radius: 4px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 4px; transition: width 0.4s ease; width: 0%;
    }

    .reset-footer {
      text-align: center; padding: 20px 0;
      font-size: 12px; color: var(--text-dim);
    }
    .reset-btn {
      display: inline-block; margin-top: 6px;
      padding: 6px 16px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-dim); font-size: 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { color: var(--accent-light); border-color: var(--accent-light); }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--green); color: #000;
      padding: 10px 24px; border-radius: 24px;
      font-size: 14px; font-weight: 600;
      z-index: 999; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 400; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; width: 360px; max-width: 90vw;
    }
    .modal-box h3 { font-size: 16px; margin-bottom: 12px; }
    .modal-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; }
    .modal-box input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; font-size: 14px;
      color: var(--text); outline: none; font-family: monospace;
      margin-bottom: 14px;
    }
    .modal-box input:focus { border-color: var(--accent-light); }
    .modal-actions {
      display: flex; gap: 8px; justify-content: flex-end;
    }
    .modal-btn {
      padding: 8px 16px; border-radius: 8px; font-size: 13px;
      cursor: pointer; border: none; font-family: inherit;
      transition: all 0.15s;
    }
    .modal-btn.primary {
      background: var(--accent); color: #fff;
    }
    .modal-btn.primary:hover { background: var(--accent-light); }
    .modal-btn.secondary {
      background: transparent; color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .modal-btn.secondary:hover { color: var(--text); }
    .modal-error { color: var(--red); font-size: 12px; margin-bottom: 10px; display: none; }

    /* ── Responsive tweaks ── */
    @media (min-width: 1600px) {
      .future-grid { grid-template-columns: repeat(3, 1fr); }
      .principles-cal-row { gap: 28px; }
    }

  <!-- Toast -->

  <script src="shared.js"></script>
  <script>
    // ============================================================
    //  GitHub Sync Module (self-contained)
    // ============================================================
    var githubSync = (function() {
      var TOKEN_KEY = 'github_sync_token';
      var REPO_KEY = 'github_sync_repo';
      var FILE_PATH = 'data/checkin-data.json';
      var HOURLY_FILE = 'data/checkin-hourly.json';

      function getToken() { return localStorage.getItem(TOKEN_KEY); }
      function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
      function getRepo() { return localStorage.getItem(REPO_KEY) || ''; }

      function parseRepo() {
        var repo = getRepo();
        var m = repo.match(/github\.com\/([^\/]+)\/([^\/]+?)(?:\.git)?$/);
        if (!m && repo.indexOf('/') !== -1) m = { 1: repo.split('/')[0], 2: repo.split('/')[1] };
        if (!m) return null;
        return { owner: m[1], repo: m[2].replace('.git','') };
      }

      async function apiCall(method, url, body) {
        var token = getToken();
        var headers = { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' };
        if (body) { headers['Content-Type'] = 'application/json'; }
        var resp = await fetch(url, { method: method, headers: headers, body: body ? JSON.stringify(body) : undefined });
        if (!resp.ok) {
          var err = await resp.text();
          throw new Error('GitHub API error ' + resp.status + ': ' + err);
        }
        if (resp.status === 204) return null;
        return resp.json();
      }

      async function verifyToken(token) {
        try {
          var headers = { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' };
          var resp = await fetch('https://api.github.com/user', { headers: headers });
          if (resp.ok) {
            var user = await resp.json();
            return { valid: true, user: user.login };
          }
          return { valid: false, error: 'Token 无效或权限不足' };
        } catch(e) {
          return { valid: false, error: '网络错误: ' + e.message };
        }
      }

      async function getFileSha(path) {
        try {
          var r = parseRepo();
          if (!r) return null;
          var url = 'https://api.github.com/repos/' + r.owner + '/' + r.repo + '/contents/' + path;
          var data = await apiCall('GET', url);
          return data.sha;
        } catch(e) { return null; }
      }

      async function uploadFile(path, content) {
        var r = parseRepo();
        if (!r) throw new Error('未配置仓库');
        var url = 'https://api.github.com/repos/' + r.owner + '/' + r.repo + '/contents/' + path;
        var sha = await getFileSha(path);
        var body = {
          message: 'Update ' + path + ' - ' + new Date().toISOString(),
          content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
        };
        if (sha) body.sha = sha;
        return apiCall('PUT', url, body);
      }

      async function downloadFile(path) {
        try {
          var r = parseRepo();
          if (!r) return null;
          var url = 'https://api.github.com/repos/' + r.owner + '/' + r.repo + '/contents/' + path;
          var data = await apiCall('GET', url);
          if (data.content) {
            return JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\s/g,'')))));
          }
          return null;
        } catch(e) { return null; }
      }

      async function syncOnLoad() {
        var token = getToken();
        if (!token || !getRepo()) {
          updateSyncUI('offline');
          return;
        }
        updateSyncUI('syncing');
        try {
          var remoteData = await downloadFile(FILE_PATH);
          if (remoteData) {
            var localData = loadData();
            if (JSON.stringify(remoteData) !== JSON.stringify(localData)) {
              saveData(mergeData(localData, remoteData));
            }
          }
          var remoteHourly = await downloadFile(HOURLY_FILE);
          if (remoteHourly) {
            var localHourly = loadHourly();
            if (JSON.stringify(remoteHourly) !== JSON.stringify(localHourly)) {
              saveHourly(mergeData(localHourly, remoteHourly));
            }
          }
          updateSyncUI('synced');
        } catch(e) {
          updateSyncUI('error');
        }
      }

      async function pushData() {
        var token = getToken();
        if (!token || !getRepo()) return;
        updateSyncUI('syncing');
        try {
          await uploadFile(FILE_PATH, loadData());
          await uploadFile(HOURLY_FILE, loadHourly());
          updateSyncUI('synced');
        } catch(e) {
          updateSyncUI('error');
        }
      }

      function mergeData(local, remote) {
        var merged = {};
        var keys = Object.keys(local).concat(Object.keys(remote));
        for (var i = 0; i < keys.length; i++) {
          var k = keys[i];
          if (merged[k]) continue;
          var lv = local[k], rv = remote[k];
          if (!lv) { merged[k] = rv; }
          else if (!rv) { merged[k] = lv; }
          else {
            merged[k] = Object.assign({}, rv, lv);
          }
        }
        return merged;
      }

      function updateSyncUI(state) {
        var pill = document.getElementById('syncPill');
        var dot = document.getElementById('sidebarSyncDot');
        var text = document.getElementById('sidebarSyncText');
        pill.className = 'sync-pill ' + state;
        if (dot) { dot.className = 'dot-indicator ' + (state === 'synced' ? 'synced' : state === 'error' ? 'error' : ''); }
        switch(state) {
          case 'synced': pill.textContent = '☁️ 已同步'; if (text) text.textContent = '已同步'; break;
          case 'syncing': pill.textContent = '☁️ 同步中...'; if (text) text.textContent = '同步中...'; break;
          case 'error': pill.textContent = '☁️ 同步失败'; if (text) text.textContent = '同步失败'; break;
          default: pill.textContent = '☁️ 离线'; if (text) text.textContent = '未同步'; break;
        }
      }

      return {
        getToken: getToken,
        setToken: setToken,
        verifyToken: verifyToken,
        syncOnLoad: syncOnLoad,
        pushData: pushData,
        updateSyncUI: updateSyncUI,
        setRepo: function(r) { localStorage.setItem(REPO_KEY, r); },
        getRepo: getRepo,
        parseRepo: parseRepo
      };
    })();

    // ============================================================
    //  Home Lock (12 seconds)
    // ============================================================
    var homeLocked = true;
    var homeLockSeconds = 12;
    var homeLockInterval = null;
    var homeLockStart = 0;

    function clearLock() {
      if (homeLockInterval) { clearInterval(homeLockInterval); homeLockInterval = null; }
    }

    function initHomeLock() {
      clearLock();
      var overlay = document.getElementById('homeLockOverlay');
      var timerEl = document.getElementById('homeLockTimer');
      var navItems = document.querySelectorAll('.sidebar-nav-item[data-page="hourly"], .sidebar-nav-item[data-page="checkin"]');

      overlay.classList.remove('hidden');
      navItems.forEach(function(b) { b.classList.add('locked'); });

      homeLocked = true;
      homeLockStart = Date.now();
      timerEl.textContent = homeLockSeconds;
      updateLockTimer();

      homeLockInterval = setInterval(updateLockTimer, 200);
    }

    function updateLockTimer() {
      var elapsed = (Date.now() - homeLockStart) / 1000;
      var left = Math.max(0, homeLockSeconds - elapsed);
      var display = Math.ceil(left);
      document.getElementById('homeLockTimer').textContent = display;

      if (left <= 0) {
        clearInterval(homeLockInterval);
        homeLockInterval = null;
        homeLocked = false;
        document.getElementById('homeLockOverlay').classList.add('hidden');
        document.querySelectorAll('.sidebar-nav-item').forEach(function(b) { b.classList.remove('locked'); });
      }
    }

    window.addEventListener('beforeunload', clearLock);

    // ============================================================
    //  Sidebar Navigation
    // ============================================================
    function switchDesktopPage(page) {
      if (homeLocked && page !== 'home') return;

      document.querySelectorAll('.desktop-page').forEach(function(p) { p.classList.remove('active'); });
      document.querySelectorAll('.sidebar-nav-item').forEach(function(n) { n.classList.remove('active'); });

      document.getElementById('desktopPage' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
      var navItem = document.querySelector('.sidebar-nav-item[data-page="' + page + '"]');
      if (navItem) navItem.classList.add('active');

      updateHeader(page);
      if (page === 'hourly') renderHourly();
      if (page === 'home') renderCalendar();
      if (page === 'checkin') renderDesktopCheckin();
    }

    function updateHeader(tab) {
      var dateEl = document.getElementById('headerDate');
      if (tab === 'checkin') {
        var now = new Date();
        var eod = new Date(now); eod.setHours(23,59,59,999);
        var left = Math.max(0, Math.ceil((CYCLE_END - eod) / 86400000));
        if (left <= 0) {
          dateEl.textContent = '🎉 周期结束';
        } else {
          dateEl.textContent = '本月目标倒计时 · 剩余 ' + left + ' 天';
        }
      } else if (tab === 'hourly') {
        var d = new Date();
        var weekDays = ['日','一','二','三','四','五','六'];
        dateEl.textContent = d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate() + ' 周' + weekDays[d.getDay()];
      } else {
        dateEl.textContent = '2026.06.12 — 2026.07.12';
      }
    }

    // ============================================================
    //  Page 1: Principles + Calendar
    // ============================================================
    var calYear, calMonth;

    function renderDesktopHome() {
      renderPrinciples();
      renderCalendar();
    }

    function renderPrinciples() {
      var el = document.getElementById('desktopPrinciplesList');
      if (!el) return;
      el.innerHTML = PRINCIPLES.map(function(p, i) {
        return '<div class="principle-item' + (i===0 ? ' first-principle' : '') + '">' +
          '<span class="principle-num">' + (i+1) + '.</span>' +
          '<span>' + p + '</span></div>';
      }).join('');
    }

    function renderCalendar() {
      var now = new Date();
      calYear = now.getFullYear();
      calMonth = now.getMonth();
      renderCalGrid();
    }

    function renderCalGrid() {
      var grid = document.getElementById('desktopCalGrid');
      var label = document.getElementById('calMonthLabel');
      if (!grid) return;

      label.textContent = calYear + '年' + (calMonth + 1) + '月';
      grid.innerHTML = '';

      var firstDay = new Date(calYear, calMonth, 1).getDay();
      var daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      var today = getToday();
      var data = loadData();

      for (var i = 0; i < firstDay; i++) {
        grid.innerHTML += '<div class="cal-day empty"></div>';
      }

      for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
        var dayData = data[dateStr] || {};
        var checked = Object.keys(dayData).length;
        var cls = 'cal-day';
        if (checked > 0) {
          cls += ' has-data';
          if (checked === TASKS.length) cls += ' done-all';
          else cls += ' done-part';
        }
        if (dateStr === today) cls += ' today';
        grid.innerHTML += '<div class="' + cls + '">' + d + '</div>';
      }

      updateMonthlyStats();
    }

    function changeMonth(delta) {
      calMonth += delta;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalGrid();
    }

    function updateMonthlyStats() {
      var stats = document.getElementById('monthlyStats');
      if (!stats) return;

      var data = loadData();
      var totalDays = 0, totalChecks = 0, perfectDays = 0;
      var yearStr = calYear + '-' + String(calMonth+1).padStart(2,'0');

      for (var day in data) {
        if (data.hasOwnProperty(day) && day.indexOf(yearStr) === 0) {
          var checks = Object.keys(data[day]).length;
          if (checks > 0) {
            totalDays++;
            totalChecks += checks;
            if (checks === TASKS.length) perfectDays++;
          }
        }
      }

      stats.innerHTML =
        '<div class="monthly-stat"><div class="stat-value">' + totalDays + '</div><div class="stat-label">打卡天数</div></div>' +
        '<div class="monthly-stat"><div class="stat-value">' + totalChecks + '</div><div class="stat-label">总完成项</div></div>' +
        '<div class="monthly-stat"><div class="stat-value">' + perfectDays + '</div><div class="stat-label">完美日</div></div>';
    }

    document.getElementById('calMonthLabel').addEventListener('dblclick', function() {
      var now = new Date();
      calYear = now.getFullYear();
      calMonth = now.getMonth();
      renderCalGrid();
    });

    // ============================================================
    //  Page 2: Hourly Timeline (Desktop Layout)
    // ============================================================
    var hourlyEditingSlot = null;
    var hourlyEditingType = null;

    function startEditHourly(slotId, type, currentGoal) {
      hourlyEditingSlot = slotId;
      hourlyEditingType = type;
      renderHourly();
      var inp = document.getElementById('hourlyEditInput');
      if (inp) { inp.value = currentGoal || ''; setTimeout(function(){ inp.focus(); }, 100); }
    }

    function saveEditHourly(slotId) {
      var inp = document.getElementById('hourlyEditInput');
      var goal = inp ? inp.value.trim() : '';
      setHourlyGoal(slotId, hourlyEditingType, goal);
      hourlyEditingSlot = null;
      hourlyEditingType = null;
      renderHourly();
    }

    function cancelEditHourly() {
      hourlyEditingSlot = null;
      hourlyEditingType = null;
      renderHourly();
    }

    function renderHourly() {
      var today = getTodayHourly();
      var now = new Date();
      var h = now.getHours(), m = now.getMinutes();
      var nowMin = h * 60 + m;
      var total = WORK_SLOTS.length + NIGHT_SLOTS.length;

      var currentRound = 0;
      for (var i = 0; i < WORK_SLOTS.length; i++) {
        var t = WORK_SLOTS[i].time.split(':');
        var slotMin = parseInt(t[0]) * 60 + parseInt(t[1]);
        if (nowMin >= slotMin) currentRound = i + 1;
      }
      if (nowMin >= 21*60+30) currentRound = 16;
      if (nowMin >= 22*60) currentRound = 17;
      if (nowMin >= 22*60+30) currentRound = 18;
      if (nowMin >= 6*60+30 && nowMin < 22*60+30 && currentRound === 0) currentRound = 1;
      if (h < 6 || (h === 6 && m < 30)) currentRound = 18;

      // Build dot arrays
      var habitDoneCnt = 0, habitMissCnt = 0;
      var focusDoneCnt = 0, focusMissCnt = 0;
      var habitDots = '', focusDots = '';

      function dotClass(rn, done) {
        if (rn < currentRound) {
          if (done) return 'dot done';
          return 'dot miss';
        }
        if (rn === currentRound) {
          if (done) return 'dot done';
          return 'dot current';
        }
        return 'dot';
      }

      WORK_SLOTS.forEach(function(s, i) {
        var rn = i + 1;
        var hDone = isHourlyDone(today, s.id, 'habit');
        var fDone = isHourlyDone(today, s.id, 'focus');
        habitDots += '<span class="' + dotClass(rn, hDone) + '"></span>';
        focusDots += '<span class="' + dotClass(rn, fDone) + '"></span>';
        if (hDone) habitDoneCnt++; else if (rn < currentRound) habitMissCnt++;
        if (fDone) focusDoneCnt++; else if (rn < currentRound) focusMissCnt++;
      });

      NIGHT_SLOTS.forEach(function(s, j) {
        var rn = WORK_SLOTS.length + j + 1;
        var nDone = typeof today.done[s.id] === 'boolean' ? today.done[s.id] : isHourlyDone(today, s.id, 'habit');
        habitDots += '<span class="' + dotClass(rn, nDone) + '"></span>';
        focusDots += '<span class="' + dotClass(rn, nDone) + '"></span>';
        if (nDone) habitDoneCnt++; else if (rn < currentRound) habitMissCnt++;
      });

      // Round info
      var infoEl = document.getElementById('hourlyRoundInfo');
      if (infoEl) {
        if (currentRound === 0 || currentRound > total) {
          infoEl.innerHTML = '<span class="round-num">' + total + '</span> 轮 · 全天结束';
        } else {
          infoEl.innerHTML = '第 <span class="round-num">' + currentRound + '</span> / ' + total + ' 轮';
        }
      }

      // Stats
      var statsEl = document.getElementById('hourlyRoundStats');
      if (statsEl) {
        statsEl.innerHTML =
          '<span>习惯 <span class="done-cnt">✓' + habitDoneCnt + '</span> <span class="miss-cnt">✗' + habitMissCnt + '</span></span>' +
          '<span>45min <span class="done-cnt">✓' + focusDoneCnt + '</span> <span class="miss-cnt">✗' + focusMissCnt + '</span></span>';
      }

      // Dots
      var dotsHabit = document.getElementById('hourlyDotsHabit');
      var dotsFocus = document.getElementById('hourlyDotsFocus');
      if (dotsHabit) dotsHabit.innerHTML = '<span class="dots-label">习惯</span><div class="dots">' + habitDots + '</div>';
      if (dotsFocus) dotsFocus.innerHTML = '<span class="dots-label">45min</span><div class="dots">' + focusDots + '</div>';

      // Build slot cards
      var currentSlotId = currentRound > 0 && currentRound <= WORK_SLOTS.length ? WORK_SLOTS[currentRound - 1].id : null;

      var currentHtml = '';
      var futureItems = [];
      var pastItems = [];

      WORK_SLOTS.forEach(function(s, idx) {
        var habitGoal = getHourlyGoal(today, s.id, 'habit');
        var focusGoal = getHourlyGoal(today, s.id, 'focus');
        var habitDone = isHourlyDone(today, s.id, 'habit');
        var focusDone = isHourlyDone(today, s.id, 'focus');
        var isCurrent = s.id === currentSlotId;
        var isPast = (idx + 1) < currentRound;

        var card = buildHourlySlotCard(s, habitGoal, focusGoal, habitDone, focusDone, isCurrent, isPast);

        if (isCurrent) {
          currentHtml = card;
        } else if (isPast) {
          pastItems.push(card);
        } else {
          futureItems.push(card);
        }
      });

      var html = '';

      // Current slot (full width)
      if (currentHtml) {
        html += currentHtml;
      }

      // Future slots (2-column grid)
      if (futureItems.length > 0) {
        html += '<div class="future-grid">';
        futureItems.forEach(function(c) { html += c; });
        html += '</div>';
      }

      // Past slots (collapsible accordion, default collapsed)
      if (pastItems.length > 0) {
        html += '<div class="past-accordion-header" id="pastAccordionHeader" onclick="togglePastAccordion()">' +
          '<span class="accordion-arrow">▶</span> 已完成时段 (' + pastItems.length + ') </div>';
        html += '<div class="past-accordion-body" id="pastAccordionBody">';
        pastItems.forEach(function(c) { html += c; });
        html += '</div>';
      }

      // Night divider + slots (2-column grid)
      html += '<div class="hourly-divider">🌙 晚间</div>';
      html += '<div class="night-grid">';

      NIGHT_SLOTS.forEach(function(s) {
        var goal = typeof today.goals[s.id] === 'string' ? today.goals[s.id] : (getHourlyGoal(today, s.id, 'habit') || s.goal);
        var isDone = typeof today.done[s.id] === 'boolean' ? today.done[s.id] : isHourlyDone(today, s.id, 'habit');

        html += '<div class="hourly-slot night' + (isDone ? ' done' : '') + '">';
        html += '<div class="hourly-time">' + s.time + '<div class="sub">' + s.label.split('-')[1] + '</div></div>';
        html += '<div class="goal-text" style="flex:1;font-size:12px;">' + goal + '</div>';
        html += '<div class="night-check" onclick="toggleHourlyDone(\'' + s.id + '\',\'habit\')">✓</div>';
        html += '</div>';
      });

      html += '</div>';

      var slotsEl = document.getElementById('hourlySlots');
      if (slotsEl) slotsEl.innerHTML = html;
    }

    function buildHourlySlotCard(s, habitGoal, focusGoal, habitDone, focusDone, isCurrent, isPast) {
      var extraClass = '';
      if (isCurrent) extraClass += ' current-slot';
      if (isPast) extraClass += ' past-slot';

      var card = '<div class="hourly-slot' + extraClass + '">';
      card += '<div class="hourly-time"><div>' + s.time + '</div><div class="time-dash">│</div><div>' + s.end + '</div><div class="sub">45+15</div></div>';
      card += '<div class="hourly-goals-wrap">';

      var isEditingHabit = hourlyEditingSlot === s.id && hourlyEditingType === 'habit';
      if (isEditingHabit) {
        card += '<div class="hourly-goal-row habit"><span class="goal-tag habit-tag">习惯</span><div class="hourly-goal-edit"><input id="hourlyEditInput" placeholder="习惯目标..." onkeydown="if(event.key===\'Enter\')saveEditHourly(\'' + s.id + '\');if(event.key===\'Escape\')cancelEditHourly();" onblur="saveEditHourly(\'' + s.id + '\')"></div></div>';
      } else {
        var hg = (habitGoal || '').replace(/'/g, "\\'");
        card += '<div class="hourly-goal-row habit' + (habitDone ? ' done-row' : '') + '" onclick="startEditHourly(\'' + s.id + '\',\'habit\',\'' + hg + '\')"><span class="goal-tag habit-tag">习惯</span><span class="goal-text">' + (habitGoal || '点击设置...') + '</span><span class="check-mini' + (habitDone ? ' done' : '') + '" onclick="event.stopPropagation();toggleHourlyDone(\'' + s.id + '\',\'habit\')">' + (habitDone ? '✓' : '✗') + '</span></div>';
      }

      var isEditingFocus = hourlyEditingSlot === s.id && hourlyEditingType === 'focus';
      if (isEditingFocus) {
        card += '<div class="hourly-goal-row focus"><span class="goal-tag focus-tag">45min</span><div class="hourly-goal-edit"><input id="hourlyEditInput" placeholder="45min目标..." onkeydown="if(event.key===\'Enter\')saveEditHourly(\'' + s.id + '\');if(event.key===\'Escape\')cancelEditHourly();" onblur="saveEditHourly(\'' + s.id + '\')"></div></div>';
      } else {
        var fg = (focusGoal || '').replace(/'/g, "\\'");
        card += '<div class="hourly-goal-row focus' + (focusDone ? ' done-row' : '') + '" onclick="startEditHourly(\'' + s.id + '\',\'focus\',\'' + fg + '\')"><span class="goal-tag focus-tag">45min</span><span class="goal-text">' + (focusGoal || '点击设置...') + '</span><span class="check-mini' + (focusDone ? ' done' : '') + '" onclick="event.stopPropagation();toggleHourlyDone(\'' + s.id + '\',\'focus\')">' + (focusDone ? '✓' : '✗') + '</span></div>';
      }

      card += '</div></div>';
      return card;
    }

    function togglePastAccordion() {
      var header = document.getElementById('pastAccordionHeader');
      var body = document.getElementById('pastAccordionBody');
      if (header && body) {
        header.classList.toggle('open');
        body.classList.toggle('open');
      }
    }

    function clearAllHourlyDesktop() {
      if (!confirm('确定清空今日所有时刻目标和完成状态？')) return;
      var d = loadHourly();
      d[getToday()] = { goals: {}, done: {} };
      saveHourly(d);
      renderHourly();
    }

    function copyYesterdayHourlyDesktop() {
      var d = loadHourly();
      var yesterday = new Date(Date.now() - 86400000);
      var yk = yesterday.getFullYear()+'-'+String(yesterday.getMonth()+1).padStart(2,'0')+'-'+String(yesterday.getDate()).padStart(2,'0');
      if (!d[yk] || Object.keys(d[yk].goals||{}).length === 0) {
        alert('昨日无数据可复制');
        return;
      }
      d[getToday()] = { goals: Object.assign({}, d[yk].goals), done: {} };
      saveHourly(d);
      renderHourly();
    }

    // ============================================================
    //  Page 3: Daily Goals (Desktop Layout)
    // ============================================================
    function renderDesktopCheckin() {
      var todayChecked = getTodayChecked();
      var modulesEl = document.getElementById('desktopModules');
      if (!modulesEl) return;
      modulesEl.innerHTML = '';

      var totalTasks = TASKS.length;
      var doneTasks = 0;

      MODULES.forEach(function(modName) {
        var modTasks = TASKS.filter(function(t) { return t.module === modName; });
        var modDone = 0;

        var moduleDiv = document.createElement('div');
        moduleDiv.className = 'desktop-module';

        var headerHtml = '<div class="desktop-module-header">' +
          '<span class="module-emoji">' + MODULE_EMOJIS[modName] + '</span>' +
          '<span>' + modName + '</span>' +
          '<span class="module-pct" id="deskModPct_' + modName + '">0/' + modTasks.length + '</span>' +
          '</div>';

        var tasksHtml = '';

        modTasks.forEach(function(task) {
          var isDone = !!todayChecked[task.id];
          if (isDone) modDone++;
          var doneTime = todayChecked[task.id] ? formatTime(todayChecked[task.id]) : '';

          tasksHtml += '<div class="desktop-task-item' + (isDone ? ' done' : '') + '" onclick="toggleTaskDesktop(\'' + task.id + '\',\'' + task.title.replace(/'/g, "\\'") + '\')">' +
            '<div class="checkbox-desk">✓</div>' +
            '<div class="task-text">' + task.emoji + ' <b>' + task.title + '</b><br><span style="font-size:11px;color:#888;">' + task.text + '</span></div>' +
            (doneTime ? '<div class="task-done-time">' + doneTime + '</div>' : '') +
            '</div>';
        });

        doneTasks += modDone;

        moduleDiv.innerHTML = headerHtml + tasksHtml;
        var pctEl = moduleDiv.querySelector('.module-pct');
        pctEl.textContent = modDone + '/' + modTasks.length;
        if (modDone === modTasks.length) {
          pctEl.style.color = 'var(--green)';
        }

        modulesEl.appendChild(moduleDiv);
      });

      var pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
      document.getElementById('deskTodayPct').textContent = pct + '%';
      document.getElementById('deskProgressFill').style.width = pct + '%';

      if (pct === 100 && doneTasks > 0) {
        document.getElementById('deskTodayPct').style.color = 'var(--green)';
        showToast('🎉 今日全部完成！太棒了！');
      } else {
        document.getElementById('deskTodayPct').style.color = 'var(--accent-light)';
      }

      updateSidebarStats();
    }

    function toggleTaskDesktop(taskId, taskTitle) {
      var todayChecked = getTodayChecked();
      var isDone = !!todayChecked[taskId];
      setTaskChecked(taskId, !isDone);

      if (!isDone) {
        showToast('✅ ' + taskTitle + ' — 完成！');
      }

      renderDesktopCheckin();
    }

    function resetTodayDesktop() {
      if (confirm('确定要重置今天所有打卡记录吗？')) {
        var data = loadData();
        var today = getToday();
        delete data[today];
        saveData(data);
        renderDesktopCheckin();
        showToast('🔄 已重置');
      }
    }

    // ============================================================
    //  Sidebar Stats
    // ============================================================
    function updateSidebarStats() {
      var streak = getStreak();
      var total = getTotalCheckins();
      var todayChecked = getTodayChecked();
      var doneCount = Object.keys(todayChecked).length;
      var pct = TASKS.length > 0 ? Math.round((doneCount / TASKS.length) * 100) : 0;

      document.getElementById('sidebarStreak').textContent = streak + ' 天';
      document.getElementById('sidebarTotal').textContent = total + ' 次';
      document.getElementById('sidebarProgressLabel').textContent = '今日进度 ' + pct + '%';
      document.getElementById('sidebarMiniFill').style.width = pct + '%';
    }

    // ============================================================
    //  Toast
    // ============================================================
    function showToast(msg) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(function() { toast.classList.remove('show'); }, 1800);
    }

    // ============================================================
    //  Token Setup Modal
    // ============================================================
    function showTokenModal() {
      document.getElementById('tokenModal').classList.remove('hidden');
      document.getElementById('tokenError').style.display = 'none';
      document.getElementById('tokenInput').value = githubSync.getToken() || '';
    }

    function hideTokenModal() {
      document.getElementById('tokenModal').classList.add('hidden');
    }

    async function saveToken() {
      var token = document.getElementById('tokenInput').value.trim();
      var errorEl = document.getElementById('tokenError');

      if (!token) {
        errorEl.textContent = '请输入 Token';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      errorEl.textContent = '正在验证...';
      errorEl.style.display = 'block';
      errorEl.style.color = 'var(--text-dim)';

      var result = await githubSync.verifyToken(token);
      if (result.valid) {
        githubSync.setToken(token);
        hideTokenModal();
        showToast('✅ Token 验证成功 — ' + result.user);
        doSync();
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
        errorEl.style.color = 'var(--red)';
      }
    }

    function skipToken() {
      hideTokenModal();
    }

    // ============================================================
    //  Sync
    // ============================================================
    function doSync() {
      var token = githubSync.getToken();
      if (!token) {
        showTokenModal();
        return;
      }
      githubSync.pushData();
    }

    // ============================================================
    //  Init
    // ============================================================
    function init() {
      renderDesktopHome();
      updateSidebarStats();
      initHomeLock();

      // Check if token is set, show modal on first visit
      if (!githubSync.getToken() && !localStorage.getItem('github_token_skipped')) {
        showTokenModal();
      }

      // Try GitHub sync on load
      githubSync.syncOnLoad().then(function() {
        renderDesktopCheckin();
        renderHourly();
        updateSidebarStats();
      });

      // Calendar label double-click to reset
      var calLabel = document.getElementById('calMonthLabel');
      if (calLabel) {
        calLabel.addEventListener('dblclick', function() {
          var now = new Date();
          calYear = now.getFullYear();
          calMonth = now.getMonth();
          renderCalGrid();
        });
      }

      // Close token modal on overlay click
      document.getElementById('tokenModal').addEventListener('click', function(e) {
        if (e.target === this) hideTokenModal();
      });

      // Midnight refresh
      scheduleMidnightRefresh();
    }

    function scheduleMidnightRefresh() {
      var now = new Date();
      var midnight = new Date(now);
      midnight.setHours(24, 0, 0, 0);
      var ms = midnight - now;
      setTimeout(function() {
        renderDesktopCheckin();
        updateSidebarStats();
        scheduleMidnightRefresh();
      }, ms + 1000);
    }

    // Start
    init();
  </script>
</body>
</html>
